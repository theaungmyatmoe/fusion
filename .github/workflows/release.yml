name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux x86_64 (static musl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: fusion
          # Linux aarch64 (static musl, cross-compiled)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: fusion
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: fusion
          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: fusion
          # Android/Termux aarch64
          - target: aarch64-linux-android
            os: ubuntu-latest
            binary: fusion

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: contains(matrix.target, 'aarch64-unknown-linux') || contains(matrix.target, 'android')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native)
        if: "!contains(matrix.target, 'aarch64-unknown-linux') && !contains(matrix.target, 'android')"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: contains(matrix.target, 'aarch64-unknown-linux') || contains(matrix.target, 'android')
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          tar czf ${{ matrix.binary }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: dist/${{ matrix.binary }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
