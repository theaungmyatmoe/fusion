name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl) ────────────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: fusion
            cross: false

          # Termux / Android ARM64 — cross-compiled
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: fusion
            cross: true

          # ── macOS ─────────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-13        # last Intel runner
            binary: fusion
            cross: false

          - target: aarch64-apple-darwin
            os: macos-latest    # Apple Silicon
            binary: fusion
            cross: false

    runs-on: ${{ matrix.os }}

    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      # protobuf codegen (xai-grok-tools-api etc.) needs a real protoc on PATH.
      # bin/protoc is a DotSlash wrapper and fails in CI without dotslash.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      # ── Linux x86_64 musl (native, just needs musl-tools) ─────────────────
      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # ── Cross-compile (aarch64 musl / Android) ───────────────────────────
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      # ── Cache ─────────────────────────────────────────────────────────────
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (native)
        if: "!matrix.cross"
        env:
          CARGO_BUILD_JOBS: 2
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --features release-dist \
            -p xai-grok-pager-bin

      - name: Build (cross)
        if: matrix.cross
        env:
          CARGO_BUILD_JOBS: 2
        run: |
          cross build \
            --release \
            --target ${{ matrix.target }} \
            --features release-dist \
            -p xai-grok-pager-bin

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package binary
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARTIFACT="fusion-${TAG}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          cd dist
          tar czf "${ARTIFACT}.tar.gz" "${{ matrix.binary }}"
          # Produce a checksum
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          rm "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fusion-${{ matrix.target }}
          path: dist/*

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Fusion ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux x86_64 (static) | `fusion-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux aarch64 / Termux (static) | `fusion-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz` |
            | macOS Intel | `fusion-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `fusion-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |

            ### Install (Termux / Android)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/fusion-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz | tar xz
            chmod +x fusion
            mv fusion $PREFIX/bin/fusion
            ```
